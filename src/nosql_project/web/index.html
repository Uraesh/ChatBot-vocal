<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vocal IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0ede8;--muted:rgba(240,237,232,0.38);
  --accent:#c8b89a;--accent-dim:rgba(200,184,154,0.15);
  --radius:18px;--radius-sm:10px;
  --dot-off:#2a2a2a;
  --ai-bg:#0f0f0a;--ai-border:rgba(200,184,154,.13);
  --error-bg:rgba(192,57,43,.1);--error-border:rgba(192,57,43,.22);--error-text:#e07070;
}
:root[data-theme="light"]{
  --bg:#f6f2ea;--surface:#ffffff;--surface2:#f1ede5;
  --border:rgba(20,20,20,0.08);--border2:rgba(20,20,20,0.18);
  --text:#1e1c18;--muted:rgba(40,34,28,0.45);
  --accent:#7a6546;--accent-dim:rgba(122,101,70,0.15);
  --dot-off:#b8b0a3;
  --ai-bg:#fbfaf7;--ai-border:rgba(122,101,70,.18);
  --error-bg:rgba(192,57,43,.08);--error-border:rgba(192,57,43,.2);--error-text:#b33b3b;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow:hidden}

/* Layout */
.app{display:grid;grid-template-rows:56px 1fr auto;height:100vh;max-width:700px;margin:0 auto;padding:0 18px}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.brand{font-family:'Instrument Serif',serif;font-size:1.15rem;letter-spacing:.01em}
.brand em{color:var(--accent);font-style:italic}
.header-actions{display:flex;align-items:center;gap:10px}
.theme-toggle{border:1px solid var(--border2);background:transparent;color:var(--text);padding:6px 10px;border-radius:999px;font-size:.72rem;letter-spacing:.04em;cursor:pointer;transition:border-color .2s,transform .12s}
.theme-toggle:hover{border-color:var(--accent);transform:translateY(-1px)}
.theme-toggle:active{transform:translateY(0)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dot-off);transition:background .4s}
.dot.on{background:#5a9e6f;box-shadow:0 0 8px rgba(90,158,111,.5)}

/* Conversation */
.conv{overflow-y:auto;padding:20px 0 8px;display:flex;flex-direction:column;gap:14px;scrollbar-width:none}
.conv::-webkit-scrollbar{display:none}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.28;pointer-events:none;padding-bottom:80px}
.empty-icon{width:44px;height:44px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.empty p{font-size:.82rem;color:var(--muted);text-align:center;line-height:1.7}

/* Bulles */
.bubble{max-width:84%;padding:12px 16px;line-height:1.68;font-size:.93rem;animation:pop .25s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.bubble.user{align-self:flex-end;background:var(--surface2);border:1px solid var(--border2);border-bottom-right-radius:4px;border-radius:var(--radius);border-bottom-right-radius:4px}
.bubble.ai{align-self:flex-start;background:var(--ai-bg);border:1px solid var(--ai-border);border-radius:var(--radius);border-bottom-left-radius:4px}
.bubble.ai .lbl{font-size:.68rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;font-weight:400}
.bubble.err{align-self:center;background:var(--error-bg);border:1px solid var(--error-border);font-size:.82rem;color:var(--error-text);border-radius:var(--radius-sm);padding:7px 13px;max-width:90%}

/* Typing indicator */
.thinking{align-self:flex-start;display:flex;align-items:center;gap:9px;padding:11px 15px;background:var(--ai-bg);border:1px solid var(--ai-border);border-radius:var(--radius);border-bottom-left-radius:4px;animation:pop .25s both}
.dots{display:flex;gap:4px}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.4;animation:dp 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.4);opacity:1}}
.thinking-lbl{font-size:.76rem;color:var(--accent);font-style:italic}

/* Barre du bas */
.bottom{padding:12px 0 24px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px}

/* Onde IA parle */
.wave{display:none;align-items:center;justify-content:center;gap:3px;height:22px;margin-bottom:2px}
.wave.on{display:flex}
.wave .b{width:3px;border-radius:2px;background:var(--accent);animation:wb 1s ease-in-out infinite}
.wave .b:nth-child(1){height:7px;animation-delay:0s}
.wave .b:nth-child(2){height:16px;animation-delay:.1s}
.wave .b:nth-child(3){height:22px;animation-delay:.2s}
.wave .b:nth-child(4){height:14px;animation-delay:.3s}
.wave .b:nth-child(5){height:9px;animation-delay:.4s}
.wave .b:nth-child(6){height:18px;animation-delay:.15s}
.wave .b:nth-child(7){height:12px;animation-delay:.25s}
@keyframes wb{0%,100%{transform:scaleY(.5);opacity:.5}50%{transform:scaleY(1.3);opacity:1}}

/* Zone de saisie */
.input-row{display:flex;align-items:flex-end;gap:8px}
.textarea-wrap{flex:1;position:relative}
textarea{
  width:100%;min-height:44px;max-height:140px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:300;
  padding:11px 14px;resize:none;outline:none;line-height:1.55;
  transition:border-color .2s;overflow-y:auto;scrollbar-width:none;
}
textarea::-webkit-scrollbar{display:none}
textarea::placeholder{color:var(--muted)}
textarea:focus{border-color:rgba(200,184,154,.35)}

/* Boutons d'action */
.action-btns{display:flex;gap:6px;align-items:flex-end}

.btn-round{
  width:44px;height:44px;border-radius:50%;border:1.5px solid var(--border2);
  background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,background .2s,transform .12s;outline:none;flex-shrink:0;
  color:var(--text);
}
.btn-round:hover{border-color:var(--accent);transform:scale(1.05)}
.btn-round:active{transform:scale(.94)}
.btn-round.active{background:var(--accent-dim);border-color:var(--accent)}
.btn-round.send{background:var(--accent-dim);border-color:var(--accent)}
.btn-round.send:hover{background:rgba(200,184,154,.25)}
.btn-round:disabled{opacity:.3;cursor:default;transform:none}

/* Anneau micro pulsation */
.mic-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.ring{position:absolute;border-radius:50%;border:1px solid var(--accent);opacity:0;pointer-events:none}
.r1{width:58px;height:58px}.r2{width:72px;height:72px}
.mic-wrap.rec .r1{animation:rpl 1.8s ease-out infinite}
.mic-wrap.rec .r2{animation:rpl 1.8s ease-out infinite .35s}
@keyframes rpl{0%{transform:scale(.85);opacity:.5}100%{transform:scale(1.25);opacity:0}}
.proc-ring{position:absolute;width:52px;height:52px;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--accent);border-right-color:rgba(200,184,154,.3);opacity:0;transition:opacity .3s;pointer-events:none}
.mic-wrap.proc .proc-ring{opacity:1;animation:spin 1.1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Barre du bas – rangée outils */
.tools-row{display:flex;align-items:center;gap:10px}
.upload-lbl{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--muted);cursor:pointer;opacity:.5;transition:opacity .2s;user-select:none}
.upload-lbl:hover{opacity:.85}
.upload-lbl input{display:none}
.hint{font-size:.75rem;color:var(--muted);margin-left:auto}
#audio-player{display:none}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">Vocal <em>IA</em></div>
    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-pressed="false">Mode sombre</button>
      <div class="dot" id="dot"></div>
    </div>
  </header>

  <div class="conv" id="conv">
    <div class="empty" id="empty">
      <div class="empty-icon">◎</div>
      <p>Écrivez ou parlez.<br/>L'IA vous répond à voix haute.</p>
    </div>
  </div>

  <div class="bottom">

    <div class="wave" id="wave">
      <div class="b"></div><div class="b"></div><div class="b"></div>
      <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
    </div>

    <div class="input-row">
      <div class="textarea-wrap">
        <textarea id="txt" placeholder="Écrivez un message…" rows="1"></textarea>
      </div>
      <div class="action-btns">
        <!-- Bouton envoyer texte -->
        <button class="btn-round send" id="send-btn" title="Envoyer" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
        <!-- Bouton micro -->
        <div class="mic-wrap" id="mic-wrap">
          <div class="ring r1"></div><div class="ring r2"></div>
          <div class="proc-ring"></div>
          <button class="btn-round" id="mic-btn" title="Parler">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="tools-row">
      <label class="upload-lbl">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Fichier audio
        <input type="file" id="audio-file" accept="audio/*"/>
      </label>
      <span class="hint" id="hint">Appuyez sur le micro ou écrivez</span>
    </div>

  </div>
</div>

<audio id="audio-player" autoplay></audio>

<script>
const SESSION_ID = "s-" + Math.random().toString(36).slice(2,9);
const TIMEOUT_MS = 120000;

const $ = id => document.getElementById(id);
const dom = {
  conv: $("conv"), empty: $("empty"), dot: $("dot"),
  txt: $("txt"), sendBtn: $("send-btn"),
  micWrap: $("mic-wrap"), micBtn: $("mic-btn"),
  audioFile: $("audio-file"), player: $("audio-player"),
  wave: $("wave"), hint: $("hint"), themeToggle: $("theme-toggle"),
};

function getPreferredTheme(){
  const stored = localStorage.getItem("theme");
  if (stored === "light" || stored === "dark") return stored;
  if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) return "light";
  return "dark";
}

function setTheme(theme){
  const next = theme === "light" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("theme", next);
  if (dom.themeToggle){
    dom.themeToggle.textContent = next === "dark" ? "Mode clair" : "Mode sombre";
    dom.themeToggle.setAttribute("aria-pressed", next === "dark" ? "true" : "false");
  }
}

if (dom.themeToggle){
  setTheme(getPreferredTheme());
  dom.themeToggle.addEventListener("click", () => {
    const current = document.documentElement.dataset.theme || "dark";
    setTheme(current === "dark" ? "light" : "dark");
  });
}

let rec = false, proc = false, mr = null, chunks = [];

// Health
fetch("/health").then(r => r.ok && dom.dot.classList.add("on")).catch(()=>{});

// Auto-resize textarea
dom.txt.addEventListener("input", () => {
  dom.txt.style.height = "auto";
  dom.txt.style.height = Math.min(dom.txt.scrollHeight, 140) + "px";
  dom.sendBtn.disabled = !dom.txt.value.trim() || proc;
});

// Entrée = envoyer (Shift+Entrée = saut de ligne)
dom.txt.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!dom.sendBtn.disabled) sendText(); }
});

function hideEmpty(){ dom.empty.style.display = "none"; }

function addBubble(role, text){
  hideEmpty();
  const d = document.createElement("div");
  if(role === "user"){
    d.className = "bubble user"; d.textContent = text;
  } else if(role === "ai"){
    d.className = "bubble ai";
    d.innerHTML = `<div class="lbl">Assistant</div><div>${escHtml(text)}</div>`;
  } else {
    d.className = "bubble err"; d.textContent = text;
  }
  dom.conv.appendChild(d);
  d.scrollIntoView({behavior:"smooth",block:"end"});
  return d;
}

function escHtml(t){ return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function addThinking(){
  hideEmpty();
  const d = document.createElement("div");
  d.className = "thinking";
  d.innerHTML = `<div class="dots"><span></span><span></span><span></span></div><span class="thinking-lbl">réflexion…</span>`;
  dom.conv.appendChild(d);
  d.scrollIntoView({behavior:"smooth",block:"end"});
  return d;
}

function setHint(t){ dom.hint.textContent = t; }

function setProc(on){
  proc = on;
  dom.micWrap.classList.toggle("proc", on);
  dom.sendBtn.disabled = on || !dom.txt.value.trim();
  dom.micBtn.disabled = on;
  setHint(on ? "Traitement en cours…" : "Appuyez sur le micro ou écrivez");
}

function setSpeaking(on){
  dom.wave.classList.toggle("on", on);
  setHint(on ? "L'assistant répond…" : "Appuyez sur le micro ou écrivez");
}

function b64(blob){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=()=>rej(new Error("Lecture échouée")); r.readAsDataURL(blob); }); }

// ── Lecture vocale d'un texte via /chat ──
async function speakText(text){
  // On utilise l'API Web Speech si disponible (plus rapide, pas besoin de Piper)
  // Sinon on passe par l'endpoint /voice avec le texte encodé
  if("speechSynthesis" in window){
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "fr-FR";
    utt.rate = 0.95;
    // Chercher une voix française
    const voices = speechSynthesis.getVoices();
    const fr = voices.find(v => v.lang.startsWith("fr"));
    if(fr) utt.voice = fr;
    setSpeaking(true);
    utt.onend = () => setSpeaking(false);
    utt.onerror = () => setSpeaking(false);
    speechSynthesis.speak(utt);
  }
}

// ── Lecture audio Piper (depuis /voice) ──
function playAudio(base64){
  if(!base64 || base64.length < 100) return false;
  setSpeaking(true);
  dom.player.src = `data:audio/wav;base64,${base64}`;
  dom.player.load();
  dom.player.onended = () => setSpeaking(false);
  dom.player.onerror = () => setSpeaking(false);
  dom.player.oncanplaythrough = () => dom.player.play().catch(()=>setSpeaking(false));
  return true;
}

// ── Envoi texte via /chat ──
async function sendText(){
  const text = dom.txt.value.trim();
  if(!text || proc) return;
  dom.txt.value = ""; dom.txt.style.height = "auto"; dom.sendBtn.disabled = true;
  addBubble("user", text);
  const th = addThinking();
  setProc(true);
  try{
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), TIMEOUT_MS);
    const r = await fetch("/chat", {
      method:"POST", signal:ctrl.signal,
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({session_id:SESSION_ID, text}),
    });
    clearTimeout(t);
    const p = await r.json();
    th.remove();
    if(!r.ok) throw new Error(p.detail || `Erreur ${r.status}`);
    addBubble("ai", p.response || "(pas de réponse)");
    // Lecture vocale de la réponse
    await speakText(p.response || "");
  } catch(e){
    th.remove();
    addBubble("err", e.name==="AbortError" ? "Délai dépassé." : `Erreur : ${e.message}`);
  } finally { setProc(false); }
}

dom.sendBtn.addEventListener("click", sendText);

// ── Envoi audio via /voice ──
async function sendAudio(blob, label){
  if(proc) return;
  addBubble("user", label);
  const th = addThinking();
  setProc(true);
  try{
    const a64 = await b64(blob);
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), TIMEOUT_MS);
    const r = await fetch("/voice", {
      method:"POST", signal:ctrl.signal,
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({session_id:SESSION_ID, audio_base64:a64}),
    });
    clearTimeout(t);
    const p = await r.json();
    th.remove();
    if(!r.ok) throw new Error(p.detail || `Erreur ${r.status}`);
    addBubble("ai", p.text || "(pas de réponse)");
    // Audio Piper en priorité, sinon Web Speech
    if(!playAudio(p.audio_base64)) await speakText(p.text || "");
  } catch(e){
    th.remove();
    addBubble("err", e.name==="AbortError" ? "Délai dépassé — l'IA met trop de temps." : `Erreur : ${e.message}`);
  } finally { setProc(false); }
}

// ── Microphone ──
dom.micBtn.addEventListener("click", async () => {
  if(proc) return;
  if(!rec){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      chunks = [];
      mr = new MediaRecorder(stream);
      mr.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t=>t.stop());
        const blob = new Blob(chunks, {type:chunks[0]?.type||"audio/webm"});
        if(blob.size < 100){ setHint("Appuyez sur le micro ou écrivez"); return; }
        await sendAudio(blob, "🎤 Message vocal");
      };
      mr.start(); rec = true;
      dom.micWrap.classList.add("rec");
      setHint("En écoute — cliquez pour envoyer");
    } catch(e){ addBubble("err","Microphone inaccessible. Vérifiez les permissions."); }
  } else {
    rec = false;
    dom.micWrap.classList.remove("rec");
    mr?.stop();
  }
});

// ── Upload fichier ──
dom.audioFile.addEventListener("change", async () => {
  const f = dom.audioFile.files?.[0];
  if(!f) return;
  dom.audioFile.value = "";
  await sendAudio(f, `📎 ${f.name}`);
});

// Charger les voix Web Speech
if("speechSynthesis" in window) speechSynthesis.getVoices();
window.speechSynthesis?.addEventListener?.("voiceschanged", ()=>speechSynthesis.getVoices());
</script>
</body>
</html>
